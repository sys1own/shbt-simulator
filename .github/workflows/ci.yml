name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-and-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y m4 libgmp-dev libmpfr-dev libmpc-dev

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Run release tests
        run: cargo test --release

      - name: Run Python audit example
        run: |
          cp target/release/libshbt_simulator.so target/release/shbt_simulator.so
          PYTHONPATH=target/release python3 examples/run_audit.py

      - name: Run custom simulation CLI
        run: |
          cp target/release/libshbt_simulator.so target/release/shbt_simulator.so
          PYTHONPATH=target/release python3 shbt_simulate.py --mode all --output /tmp/shbt_all.json
          test -f /tmp/shbt_all.json

      - name: Test exports and optional plotting
        run: |
          pip install -r requirements.txt
          cp target/release/libshbt_simulator.so target/release/shbt_simulator.so
          PYTHONPATH=target/release python3 shbt_simulate.py --mode all --output /tmp/shbt_plot.json --plot
          test -f /tmp/shbt_plot.json
          test -f /tmp/shbt_plot_eigenvalues.png
          test -f /tmp/shbt_plot_spatial_metric.png
          PYTHONPATH=target/release python3 shbt_simulate.py --mode cosmology --format csv --output /tmp/slices
          test -f /tmp/slices_metric_slices.csv
          PYTHONPATH=target/release python3 shbt_simulate.py --mode all --format hdf5 --output /tmp/shbt_all.h5
          test -f /tmp/shbt_all.h5
